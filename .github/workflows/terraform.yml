name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Terraform
      run: terraform init
        
    - name: Terraform Format
      run: terraform fmt 

    - name: Terraform Validate
      run: terraform validate 

    - name: Terraform plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply -auto-approve 
